name: "feat: Feature Request"
description: Suggest an improvement or new feature for the KQL ADX Expert
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear and concise description of the feature you'd like to see.
      placeholder: Tell us about the feature...
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What problem does this solve? Describe the use case or workflow this feature would improve.
      placeholder: Explain the problem or use case...
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe the solution or approach you'd like.
      placeholder: How do you think this could work?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: What other approaches did you think about?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, mockups, or references about the feature request here.
      placeholder: Any extra details...
    validations:
      required: false
